name: 'Qualys IaC Security - Composite (No Docker)'
author: 'nelssec'
description: 'Scan IaC templates with Qualys TotalCloud. No Docker required — runs directly on the runner via pip.'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  directory:
    description: 'Directory with infrastructure code to scan'
    default: '.'
    required: false
  policy_name:
    description: 'Qualys TotalCloud policy name (Build time execution type) to evaluate against. If omitted, the default policy is used.'
    required: false
    default: ''
  timeout:
    description: 'Maximum time in seconds to wait for scan results before giving up.'
    required: false
    default: '600'
  polling_interval:
    description: 'Time in seconds between scan status checks. Minimum 30.'
    required: false
    default: '30'
  max_critical:
    description: 'Maximum number of CRITICAL findings allowed before failing the build. Leave empty for no limit.'
    required: false
    default: ''
  max_high:
    description: 'Maximum number of HIGH findings allowed before failing the build. Leave empty for no limit.'
    required: false
    default: ''
  max_medium:
    description: 'Maximum number of MEDIUM findings allowed before failing the build. Leave empty for no limit.'
    required: false
    default: ''
  max_low:
    description: 'Maximum number of LOW findings allowed before failing the build. Leave empty for no limit.'
    required: false
    default: ''
  auth_type:
    description: 'Authentication type: "basic" (username/password) or "oidc" (Client ID/Client Secret via Qualys Managed Tokens or external IdP).'
    required: false
    default: 'basic'
  python_version:
    description: 'Python version to use.'
    required: false
    default: '3.12'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install Qualys IaC CLI
      shell: bash
      run: pip install --quiet Qualys-IaC-Security

    - name: Run Qualys IaC Scan
      shell: bash
      env:
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_POLICY_NAME: ${{ inputs.policy_name }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
        INPUT_POLLING_INTERVAL: ${{ inputs.polling_interval }}
        INPUT_MAX_CRITICAL: ${{ inputs.max_critical }}
        INPUT_MAX_HIGH: ${{ inputs.max_high }}
        INPUT_MAX_MEDIUM: ${{ inputs.max_medium }}
        INPUT_MAX_LOW: ${{ inputs.max_low }}
        INPUT_AUTH_TYPE: ${{ inputs.auth_type }}
      run: |
        SCANID_STR="Scan launched successfully. Scan ID: "
        SCANFOLDER="${INPUT_DIRECTORY}"

        git config --global --add safe.directory "$GITHUB_WORKSPACE"

        # --- Auth resolution ---
        AUTH_TYPE_UPPER=$(echo "$INPUT_AUTH_TYPE" | tr '[:lower:]' '[:upper:]')
        AUTHTYPE_UPPER=$(echo "$AUTHTYPE" | tr '[:lower:]' '[:upper:]')
        OIDC_FLAG=""

        if [ "$AUTH_TYPE_UPPER" = "OIDC" ] || [ "$AUTHTYPE_UPPER" = "OIDC" ]; then
            if [ -n "$CLIENTID" ]; then
                UNAME=$CLIENTID
            fi
            if [ -n "$CLIENTSECRET" ]; then
                PASS=$CLIENTSECRET
            fi
            if [ -z "$UNAME" ]; then
                echo "[ERROR] CLIENTID (or UNAME) is required for OIDC authentication."
                exit 1
            fi
            if [ -z "$PASS" ]; then
                echo "[ERROR] CLIENTSECRET (or PASS) is required for OIDC authentication."
                exit 1
            fi
            OIDC_FLAG="-at OIDC"
        else
            if [ -z "$UNAME" ]; then
                echo "[ERROR] UNAME is required for basic authentication."
                exit 1
            fi
            if [ -z "$PASS" ]; then
                echo "[ERROR] PASS is required for basic authentication."
                exit 1
            fi
        fi

        if [ -z "$URL" ]; then
            echo "[ERROR] URL is required. See the Platform URLs table in the README."
            exit 1
        fi

        # --- Event handling ---
        echo "[INFO] Action triggered by $GITHUB_EVENT_NAME event"
        echo "[INFO] GITHUB_REF: ${GITHUB_REF}"
        echo "[INFO] GITHUB_REPOSITORY: ${GITHUB_REPOSITORY}"

        if [ "$GITHUB_EVENT_NAME" = "push" ] || [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            if [ "$(git diff --name-only --diff-filter=ACMRT HEAD^ HEAD | wc -l)" -eq "0" ]; then
                echo "[INFO] There are no files/folders to scan."
                echo '{"version": "2.1.0","runs": [{"tool": {"driver": {"name": "QualysIaCSecurity","organization": "Qualys"}},"results": []}]}' > response.sarif
                exit 0
            else
                echo "[INFO] From the below files, only the files with extensions supported by IaC module are included in the scan."
                git diff --name-only --diff-filter=ACMRT HEAD^ HEAD
                foldername="qiacscanfolder_$(date +%Y%m%d%H%M%S)"
                mkdir "$foldername"
                git diff --name-only --diff-filter=ACMRT HEAD^ HEAD | while IFS= read -r file; do
                    cp --parents "$file" "$foldername"
                done
                SCANFOLDER="$foldername"
            fi
        else
            if [ "$SCANFOLDER" = "." ]; then
                echo "[INFO] Scanning entire repository."
            else
                echo "[INFO] Scan Directory Path is - $SCANFOLDER"
            fi
        fi

        # --- Build CLI args ---
        echo "[INFO] Scanning Started at - $(date +"%Y-%m-%d %H:%M:%S")"

        EXTRA_ARGS=""
        if [ -n "$INPUT_TIMEOUT" ] && [ "$INPUT_TIMEOUT" != "600" ]; then
            EXTRA_ARGS="--timeout $INPUT_TIMEOUT"
        fi
        if [ -n "$INPUT_POLLING_INTERVAL" ] && [ "$INPUT_POLLING_INTERVAL" != "30" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --interval $INPUT_POLLING_INTERVAL"
        fi
        if [ -n "$OIDC_FLAG" ]; then
            EXTRA_ARGS="$EXTRA_ARGS $OIDC_FLAG"
        fi

        if [ -n "$INPUT_POLICY_NAME" ]; then
            qiac scan -a "$URL" -u "$UNAME" -p "$PASS" -d "$SCANFOLDER" -m json -n GitHubActionScan --tag [{\"BRANCH_NAME\":\"$GITHUB_REF\"},{\"REPOSITORY_NAME\":\"$GITHUB_REPOSITORY\"}] -pn "$INPUT_POLICY_NAME" $EXTRA_ARGS > result.json
        else
            qiac scan -a "$URL" -u "$UNAME" -p "$PASS" -d "$SCANFOLDER" -m json -n GitHubActionScan --tag [{\"BRANCH_NAME\":\"$GITHUB_REF\"},{\"REPOSITORY_NAME\":\"$GITHUB_REPOSITORY\"}] $EXTRA_ARGS > result.json
        fi

        LEN=${#SCANID_STR}
        let "LEN+=1"
        SCAN_ID="$(grep "$SCANID_STR" result.json | cut -c $LEN-)"

        if [ -n "$SCAN_ID" ]; then
            echo "[INFO] Scan ID:" "$SCAN_ID"
            if [ -n "$OIDC_FLAG" ]; then
                qiac getresult -a "$URL" -u "$UNAME" -p "$PASS" -i "$SCAN_ID" -m SARIF -s -at OIDC > raw_result.sarif
            else
                qiac getresult -a "$URL" -u "$UNAME" -p "$PASS" -i "$SCAN_ID" -m SARIF -s > raw_result.sarif
            fi
        fi

        if ls scan_response_*.sarif 1>/dev/null 2>&1; then
            mv scan_response_*.sarif response.sarif
            chmod 755 response.sarif
        else
            echo '{"version": "2.1.0","runs": [{"tool": {"driver": {"name": "QualysIaCSecurity","organization": "Qualys"}},"results": []}]}' > response.sarif
        fi

        echo "[INFO] Scanning Completed at - $(date +"%Y-%m-%d %H:%M:%S")"
        echo ""
        echo "SCAN RESULT"
        python "${{ github.action_path }}/../resultParser.py" result.json
