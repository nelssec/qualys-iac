name: 'Qualys IaC Security (Enhanced)'
author: 'nelssec'
description: 'Scan IaC templates with Qualys TotalCloud. Adds policy_name support for custom policy evaluation.'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  directory:
    description: 'Directory with infrastructure code to scan'
    default: '.'
    required: false
  policy_name:
    description: 'Qualys TotalCloud policy name (Build time execution type) to evaluate against. If omitted, the default policy is used.'
    required: false
    default: ''
  timeout:
    description: 'Maximum time in seconds to wait for scan results before giving up.'
    required: false
    default: '600'
  polling_interval:
    description: 'Time in seconds between scan status checks. Minimum 30.'
    required: false
    default: '30'

runs:
  using: 'docker'
  image: 'dockerfile'
  args:
    - ${{ inputs.directory }}
    - ${{ inputs.policy_name }}
    - ${{ inputs.timeout }}
    - ${{ inputs.polling_interval }}
